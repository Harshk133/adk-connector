[build-system]
requires = ["setuptools>=61.REMOVED_VALUE.REMOVED_VALUE", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "adk-connectors-telegram"
version = "REMOVED_VALUE.1.REMOVED_VALUE"
description = "Telegram adapter for ADK Connectors"
readme = "README.md"
authors = [
    { name = "Developer", email = "developer@example.com" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
requires-python = ">=3.1REMOVED_VALUE"
dependencies = [
    "adk-connectors-core",
    "httpx>=REMOVED_VALUE.24.REMOVED_VALUE",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["adk_connectors_telegram*"]
